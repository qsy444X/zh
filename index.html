<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D翻转照片</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(180deg, #fff5f7 0%, #ffe4e9 30%, #ffd6e0 60%, #ffc2d1 100%);
      perspective: 1200px;
      overflow: hidden;
      position: relative;
    }

    .heart {
      position: absolute;
      color: #ff9aab;
      opacity: 0.6;
      animation: floatHeart 6s infinite ease-in-out;
    }

    .heart:nth-child(1) {
      font-size: 24px;
      top: 10%;
      left: 10%;
      animation-delay: 0s;
    }

    .heart:nth-child(2) {
      font-size: 18px;
      top: 20%;
      right: 15%;
      animation-delay: 1s;
    }

    .heart:nth-child(3) {
      font-size: 32px;
      bottom: 25%;
      left: 20%;
      animation-delay: 2s;
    }

    .heart:nth-child(4) {
      font-size: 20px;
      bottom: 15%;
      right: 10%;
      animation-delay: 3s;
    }

    .heart:nth-child(5) {
      font-size: 28px;
      top: 50%;
      left: 5%;
      animation-delay: 4s;
    }

    .heart:nth-child(6) {
      font-size: 16px;
      top: 35%;
      right: 5%;
      animation-delay: 5s;
    }

    @keyframes floatHeart {

      0%,
      100% {
        transform: translateY(0) rotate(0deg);
        opacity: 0.4;
      }

      50% {
        transform: translateY(-30px) rotate(10deg);
        opacity: 0.8;
      }
    }

    .star {
      position: absolute;
      color: #ffd700;
      opacity: 0.7;
      animation: twinkle 3s infinite ease-in-out;
    }

    .star:nth-child(7) {
      font-size: 20px;
      top: 15%;
      right: 25%;
      animation-delay: 0s;
    }

    .star:nth-child(8) {
      font-size: 16px;
      bottom: 30%;
      right: 20%;
      animation-delay: 0.5s;
    }

    .star:nth-child(9) {
      font-size: 24px;
      top: 40%;
      left: 15%;
      animation-delay: 1s;
    }

    .star:nth-child(10) {
      font-size: 14px;
      bottom: 10%;
      left: 30%;
      animation-delay: 1.5s;
    }

    @keyframes twinkle {

      0%,
      100% {
        opacity: 0.3;
        transform: scale(1);
      }

      50% {
        opacity: 1;
        transform: scale(1.2);
      }
    }

    .flip-container {
      width: 360px;
      height: 450px;
      position: relative;
      transform-style: preserve-3d;
      animation: flip 5s infinite linear;
      z-index: 10;
    }

    .flip-container:hover {
      animation-play-state: paused;
    }

    .flip-card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(255, 154, 171, 0.4),
        0 0 0 4px rgba(255, 255, 255, 0.8),
        0 0 30px rgba(255, 154, 171, 0.2);
      transition: box-shadow 0.3s ease;
    }

    .flip-container:hover .card-face {
      box-shadow: 0 35px 60px -12px rgba(255, 154, 171, 0.5),
        0 0 0 4px rgba(255, 255, 255, 0.9),
        0 0 50px rgba(255, 154, 171, 0.3);
    }

    .card-front {
      transform: rotateY(0deg);
    }

    .card-back {
      transform: rotateY(180deg);
    }

    .card-face img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    @keyframes flip {
      0% {
        transform: rotateY(0deg);
      }

      100% {
        transform: rotateY(360deg);
      }
    }

    .hint {
      position: absolute;
      bottom: 60px;
      color: #ff7c94;
      font-family: 'Microsoft YaHei', sans-serif;
      font-size: 16px;
      font-weight: 500;
      animation: fade 2s infinite;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .hint::before {
      content: '💕';
      animation: bounce 1s infinite;
    }

    @keyframes fade {

      0%,
      100% {
        opacity: 0.6;
      }

      50% {
        opacity: 1;
      }
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-5px);
      }
    }

    @media (max-width: 480px) {
      .flip-container {
        width: 280px;
        height: 350px;
      }

      .hint {
        font-size: 14px;
        bottom: 40px;
      }
    }
  </style>
</head>

<body>
  <div class="heart">💕</div>
  <div class="heart">💗</div>
  <div class="heart">💖</div>
  <div class="heart">💝</div>
  <div class="heart">💞</div>
  <div class="heart">💓</div>
  <div class="star">✨</div>
  <div class="star">⭐</div>
  <div class="star">🌟</div>
  <div class="star">💫</div>

  <div class="flip-container">
    <div class="flip-card">
      <div class="card-face card-front">
        <img src="娇小玲珑.jpg" alt="正面照片">
      </div>
      <div class="card-face card-back">
        <img src="庞然大物.jpg" alt="反面照片">
      </div>
    </div>
  </div>

</body>

</html>
